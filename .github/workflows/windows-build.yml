name: Windows Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore WinForms app
        run: dotnet restore asutpKB.csproj

      - name: Restore core tests
        run: dotnet restore tests/AsutpKnowledgeBase.Core.Tests/AsutpKnowledgeBase.Core.Tests.csproj

      - name: Build WinForms app
        run: dotnet build asutpKB.csproj --configuration Release --no-restore

      - name: Run core tests
        run: dotnet test tests/AsutpKnowledgeBase.Core.Tests/AsutpKnowledgeBase.Core.Tests.csproj --configuration Release --no-restore

  publish-win-x64:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish win-x64 single-file
        shell: cmd
        run: scripts\publish.cmd

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "artifacts/publish/win-x64"
          $exePath = Join-Path $publishDir "asutpKB.exe"

          if (-not (Test-Path $exePath)) {
            throw "Expected publish output was not found: $exePath"
          }

          Get-ChildItem $publishDir |
            Select-Object Name, Length |
            Format-Table -AutoSize

      - name: Upload win-x64 publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: asutpkb-win-x64-single-file
          path: artifacts/publish/win-x64
          if-no-files-found: error
