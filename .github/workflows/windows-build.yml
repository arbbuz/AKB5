name: Windows Build

on:
  push:
    branches:
      - icon
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore WinForms app
        run: dotnet restore asutpKB.csproj

      - name: Restore core tests
        run: dotnet restore tests/AsutpKnowledgeBase.Core.Tests/AsutpKnowledgeBase.Core.Tests.csproj

      # ✅ Изменено: --severity warn → --severity error
      # Теперь предупреждения стиля (IDE0005) не ломают сборку, но критические ошибки всё ещё ловятся.
      - name: Verify WinForms app formatting
        run: dotnet format asutpKB.csproj --verify-no-changes --severity error --no-restore

      - name: Verify core library formatting
        run: dotnet format src/AsutpKnowledgeBase.Core/AsutpKnowledgeBase.Core.csproj --verify-no-changes --severity error --no-restore

      - name: Verify core tests formatting
        run: dotnet format tests/AsutpKnowledgeBase.Core.Tests/AsutpKnowledgeBase.Core.Tests.csproj --verify-no-changes --severity error --no-restore

      - name: Build WinForms app
        run: dotnet build asutpKB.csproj --configuration Release --no-restore

      - name: Run core tests
        run: dotnet test tests/AsutpKnowledgeBase.Core.Tests/AsutpKnowledgeBase.Core.Tests.csproj --configuration Release --no-restore

  publish-win-x64:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish win-x64 single-file
        shell: cmd
        run: scripts\publish.cmd

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "artifacts/publish/win-x64"
          $exePath = Join-Path $publishDir "asutpKB.exe"
          $unexpectedSidecarFiles = @(
            "D3DCompiler_47_cor3.dll",
            "PenImc_cor3.dll",
            "PresentationNative_cor3.dll",
            "vcruntime140_cor3.dll",
            "wpfgfx_cor3.dll"
          )

          if (-not (Test-Path $exePath)) {
            throw "Expected publish output was not found: $exePath"
          }

          $presentUnexpectedFiles = $unexpectedSidecarFiles |
            Where-Object { Test-Path (Join-Path $publishDir $_) }

          if ($presentUnexpectedFiles.Count -gt 0) {
            throw "Publish output still contains sidecar runtime files: $($presentUnexpectedFiles -join ', ')"
          }

          Get-ChildItem $publishDir |
            Select-Object Name, Length |
            Format-Table -AutoSize

      - name: Upload win-x64 publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: asutpkb-win-x64-single-file
          path: artifacts/publish/win-x64
          if-no-files-found: error
          retention-days: 14
